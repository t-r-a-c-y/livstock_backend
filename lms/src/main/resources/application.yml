server:
  port: 8081

spring:
  application:
    name: livestock-management-api
  datasource:
    url: ${DB_URL:jdbc:h2:mem:livestock;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-change-this-development-secret}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  reports:
    directory: ${REPORT_DIR:reports}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
