server.port=${SERVER_PORT:8081}

spring.application.name=livestock-management-api
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL:jdbc:h2:mem:livestock;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:false}

app.jwt.secret=${JWT_SECRET:change-this-development-secret-change-this-development-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.reports.directory=${REPORT_DIR:reports}
app.otp.expiration-minutes=${OTP_EXPIRATION_MINUTES:10}
app.otp.log-to-console=${OTP_LOG_TO_CONSOLE:true}
app.security.rate-limit.requests-per-minute=${RATE_LIMIT_REQUESTS_PER_MINUTE:60}

springdoc.swagger-ui.path=/swagger-ui.html
